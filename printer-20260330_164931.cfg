[include mainsail.cfg]

[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 3000    			#Max 4000
max_z_velocity: 15 			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

# host MCU service is preinstalled and ready to use with:
[mcu CB1]
serial: /tmp/klipper_host_mcu

[include btt_m8p_v2.cfg]
[include ebb.cfg]
[include macros.cfg]

#####################################################################
# 	Cartographer 3D Setup
#####################################################################
[mcu cartographer]
canbus_uuid: 3d610c351f28

[cartographer]
mcu: cartographer
x_offset: 0
y_offset: 24
verbose: no # For extra output

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[bed_mesh]
zero_reference_position: 175, 175
speed: 300
horizontal_move_z: 3
mesh_min: 10, 10 # The first probed coordinate, nearest to the origin. This coordinate is relative to the probe's location.
mesh_max: 340, 340 # The probed coordinate farthest from the origin. This is not necessarily the last point probed, as the probing process occurs in a zig-zag fashion. As with mesh_min, this coordinate is relative to the probe's location.
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 0,0

[adxl345]
cs_pin: cartographer:PA0 # For Cartographer V4
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points: 175, 175, 20
    
#####################################################################
# 	Homing and Gantry Adjustment Routines
#####################################################################
[idle_timeout]
timeout: 1800

[force_move]
enable_force_move: True

[safe_z_home]
home_xy_position:175,175
# speed:100
# z_hop:10

[quad_gantry_level]
gantry_corners:
	-60,-10
	410,420
points:
	50,25
	50,275
	300,275
	300,25
speed: 100
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10

#####################################################################
# 	Misc configs and settings
#####################################################################
[exclude_object]

[respond]

# Stored in printer.cfg to allow for pid tuning to save values
