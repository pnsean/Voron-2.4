#####################################################################
# 	Macros
#####################################################################

[gcode_macro G32]
gcode:
    BED_MESH_CLEAR
    G28
    QUAD_GANTRY_LEVEL
    G28

[delayed_gcode after_startup_1]
initial_duration: 1.
gcode:
  LIGHT_PENDING
  
[delayed_gcode after_startup_2]
initial_duration: 5.
gcode:
  LIGHT_OFF

[gcode_macro PRINT_START]
#   Use PRINT_START for the slicer starting script - please customise for your slicer of choice
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}
    {% set X_MID = printer.toolhead.axis_maximum.x|float / 2 %}
    {% set Y_MID = printer.toolhead.axis_maximum.y|float / 2 %}
    LIGHT_PENDING
    
    M117                         ; Clear display
    SET_GCODE_OFFSET Z=0         ; Reset Z offset

    ### Make sure extruder is operating at 100%
    M220 S100                    ; Clear existing feedrate
    M221 S100                    ; Clear existing flowrate

    M117 Initial bed & extruder warm up
    M140 S{BED_TEMP}             ; Heat bed - sync
    M109 S150                    ; Heat extruder - sync - recommended for doing a z touch

    ### Get the gantry and printer leveled and homed
    M118 Homing if needed
    CHOME                        ; Home
    G90                          ; Absolute ccordinates
    M118 Starting QGL
    QUAD_GANTRY_LEVEL            ; Level the printer via QGL
    M118 QGL Complete
    G28 Z                        ; Home back to Z
    G90                          ; Set back to absolute coordinates
    
    NOZZLE_CLEAN                 ; Brush the nozzle

    ### Calibrate bed mesh before print
    M118 Heating bed to final temp of {BED_TEMP}
    M190 S{BED_TEMP}              ; Head bed to final temp and wait if it isn't already there

    M118 Starting bed mesh calibration
    BED_MESH_CLEAR                ; Clear any existing bed mesh
    BED_MESH_CALIBRATE ADAPTIVE=1 ; Create a new bed mesh

    ### Redetect z offset now that the bed is heated
    M118 Performing cartographer touch home
    CARTOGRAPHER_TOUCH_HOME

    M118 Final prep before printing
    ### Final prep before printing
    G1 X{X_MID} Y{Y_MID} Z15 F9000
    M109 S{EXTRUDER_TEMP}
    M83 ; Relative extruder
    G21 ; Set all units to millimeters
    G90 ; Use absolute coordinates
    M82 ; Use absolute distances for extrusion
    M107
    {% if BED_TEMP > 90 %}
      FILTER_ON
    {% endif %}

    M118 Nozzle purging
    NOZZLE_PURGE
    LIGHT_PRINTING

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    SAVE_GCODE_STATE NAME=STATE_PRINT_END

    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-25.0 F3600                ; retract filament

    G91                            ; relative positioning
    G0 Z1.00 X20.0 Y20.0 F20000    ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                           ; turn off fan
    G1 Z2 F3000                    ; move nozzle up 2mm
    G90                            ; absolute positioning
    G0  X125 Y250 F3600            ; park nozzle at rear
    BED_MESH_CLEAR
    
    # The purpose of the SAVE_GCODE_STATE/RESTORE_GCODE_STATE
    # command pair is to restore the printer's coordinate system
    # and speed settings since the commands above change them.
    # However, to prevent any accidental, unintentional toolhead
    # moves when restoring the state, explicitly set MOVE=0.
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END MOVE=0
    LIGHT_OFF
    FILTER_OFF

[gcode_macro FILTER_ON]
gcode:
    SET_FAN_SPEED FAN=filter SPEED=0.8

[gcode_macro FILTER_OFF]
gcode:
    SET_FAN_SPEED FAN=filter SPEED=0

[gcode_macro LOAD_FILAMENT]
gcode:
    SAVE_GCODE_STATE NAME=load_state
    G91
    G92 E0
    G1 E101 F300 # fast-load
    RESTORE_GCODE_STATE NAME=load_state

[gcode_macro UNLOAD_FILAMENT]
gcode:
    SAVE_GCODE_STATE NAME=unload_state
    G91
    G92 E0
    G1 E25 F1000 # purge
    G1 E-101 F1500 # fast-unload
    RESTORE_GCODE_STATE NAME=unload_state

[gcode_macro CHOME]
description: Homes XYZ axis only if printer is in a non-homed state
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G32
  {% endif %}

[gcode_macro NOZZLE_PURGE]
description: Draw a purge line at the front left edge of the build plate
gcode:
  CHOME
  G0 X2.5 Y2 F3000 ; Go to front
  G0 Z0.2 ; Drop to bed
  M83 ; Set extruder to relative mode
  G1 X25 E15 F500 ; Extrude 25mm of filament into a 4cm line
  G1 X50 F5000 ; Quickly wipe away from the filament line
  G1 X75 E2.00 F1500
  G1 E-0.1 F400 ; Retract a little
  G1 Z0.5 ; Raise and begin printing

[gcode_macro NOZZLE_PARK_BUCKET]
description: Park the nozzle over the bucket
gcode:
    # ---------- Define variables ----------
    {% set brush_ref_x = 268.0 %}       # X coordinate of top-left brush corner
    {% set brush_ref_y = 354.5 %}       # Y coordinate of top-left brush corner
    {% set brush_width = 35.0 %}        # Width of brush (X dimension)
    {% set brush_depth = 7.0 %}         # Depth of brush (Y dimension)
    {% set bucket_side = "right" %}     # "right" or "left" relative to brush
    {% set bucket_offset = 10.0 %}      # Distance from brush to bucket
    {% set park_z = 5.0 %}              # Z height to park nozzle
    {% set travel_speed = 9000 %}       # XY travel speed (mm/min)
    {% set z_speed = 1500 %}            # Z-axis speed (mm/min)
    {% set do_qgl = False %}            # You should QGL in print_start.  Set to true if you plan on using this outside of print_start for safety. 

    # ---------- Safety checks. ----------
    {% if not printer.toolhead.homed_axes %}
        G28
    {% endif %}

    G90  ; Absolute positioning

    # ---------- Compute bucket coordinates ----------
    {% set cy = brush_ref_y - (brush_depth / 2.0) %}
    {% if bucket_side|lower == "right" %}
        {% set bucket_x = brush_ref_x + brush_width + bucket_offset %}
    {% else %}
        {% set bucket_x = brush_ref_x - bucket_offset %}
    {% endif %}

    # ---------- Move nozzle above bucket ----------
    G1 Z{park_z} F{z_speed}
    G1 X{bucket_x} Y{cy} F{travel_speed}

[gcode_macro NOZZLE_CLEAN]
description: "Cleans the nozzle by flicking the filament off the nozzle before scrubbing."
gcode:
    # ---------- Define variables ----------
    {% set brush_ref_x = 268.0 %}       # X coordinate of top-left brush corner
    {% set brush_ref_y = 354.5 %}       # Y coordinate of top-left brush corner
    {% set brush_width = 35.0 %}        # Width of brush
    {% set brush_depth = 7.0 %}         # Depth of brush

    {% set bucket_side = "right" %}     # "right" or "left" relative to brush
    {% set bucket_offset = 10.0 %}      # Distance from brush to bucket

    {% set clean_z = 2.5 %}               # Z height to dip nozzle into brush. Adjust this so that the nozzle is sufficiently inside the brushes without causing the brush to shift.
    {% set exit_z_lift = 4.0 %}         # Z lift after cleaning

    {% set flick_count = 5 %}           # Number of flicks into bucket
    {% set flick_speed = 9000 %}        # Speed of flick movement (mm/min)
    {% set flick_depth = 3.0 %}         # Distance nozzle moves into brush
    {% set flick_dwell_ms = 20 %}       # Dwell time at deepest point (ms)
    {% set flick_return_mult = 1.5 %}   # Return speed multiplier to bucket
    {% set flick_z_dip = 0.5 %}         # Z dip into brush

    {% set scrub_passes = 5 %}          # Number of linear passes along brush
    {% set circles_per_pass = 2 %}      # Number of circular motions per pass
    {% set circle_radius = 2.0 %}       # Radius of each circular scrub
    {% set scrub_speed = 3000 %}        # Speed for circular scrub
    {% set alternate_direction = True %} # Alternate CW/CCW circles

    {% set travel_speed = 9000 %}       # XY travel speed (mm/min)
    {% set z_speed = 1500 %}            # Z-axis speed (mm/min)
    {% set do_qgl = False %}            # You should QGL in print_start.  Set to true if you plan on using this outside of print_start for safety. 


    # ---------- Safety checks. ----------
    {% if not printer.toolhead.homed_axes %}
        G28
    {% endif %}

    G90  ; Absolute positioning

    # ---------- Precompute useful values ----------
    {% set cx = brush_ref_x + (brush_width / 2.0) %}
    {% set cy = brush_ref_y - (brush_depth / 2.0) %}
    {% set usable_width = brush_width - (circle_radius * 2) %}

    {% if bucket_side|lower == "right" %}
        {% set bucket_x = brush_ref_x + brush_width + bucket_offset %}
        {% set flick_x = brush_ref_x + brush_width - flick_depth %}
    {% else %}
        {% set bucket_x = brush_ref_x - bucket_offset %}
        {% set flick_x = brush_ref_x + flick_depth %}
    {% endif %}

    {% if scrub_passes > 1 %}
        {% set step = usable_width / (scrub_passes - 1) %}
        {% set start_x = cx - (usable_width / 2) %}
    {% else %}
        {% set step = 0 %}
        {% set start_x = cx %}
    {% endif %}

    {% set dwell = flick_dwell_ms|int %}
    {% set return_speed = flick_speed * flick_return_mult %}

    # ---------- Move to park above bucket ----------
    G1 Z{clean_z} F{z_speed}
    G1 X{bucket_x} Y{cy} F{travel_speed}

    # ---------- Flick / Edge Wipe ----------
    {% for i in range(flick_count) %}
        G1 Z{clean_z - flick_z_dip} F{z_speed}   ; Dip into brush
        G1 X{flick_x} F{flick_speed}             ; Move into brush
        G4 P{dwell}                              ; Micro dwell
        G1 X{bucket_x} F{return_speed}           ; Snap back to bucket
        G1 Z{clean_z} F{z_speed}                 ; Restore Z
    {% endfor %}

    # ---------- Circular Scrub ----------
    {% for i in range(scrub_passes) %}
        {% set x_pos = start_x + (i * step) %}
        G1 X{x_pos} Y{cy} F{travel_speed}       ; Move to scrub position

        {% for j in range(circles_per_pass) %}
            {% if alternate_direction and ((i + j) % 2 == 1) %}
                G3 X{x_pos} Y{cy} I{circle_radius} J0 F{scrub_speed}  ; CCW circle
            {% else %}
                G2 X{x_pos} Y{cy} I{circle_radius} J0 F{scrub_speed}  ; CW circle
            {% endif %}
        {% endfor %}
    {% endfor %}

    # ---------- Exit / Lift ----------
    G1 Z{clean_z + exit_z_lift} F{travel_speed}

[gcode_macro LIGHT_PENDING]
gcode:
  SET_LED LED=hotend_rgb RED=1 GREEN=0.02 BLUE=0.02 WHITE=0 INDEX=1 TRANSMIT=0
  SET_LED LED=hotend_rgb RED=0 GREEN=0 BLUE=0 WHITE=0 INDEX=2 TRANSMIT=0
  SET_LED LED=hotend_rgb RED=0 GREEN=0 BLUE=0 WHITE=0 INDEX=3 TRANSMIT=1
  #SET_PIN PIN=caselight VALUE=0

[gcode_macro LIGHT_PRINTING]
gcode:
  SET_LED LED=hotend_rgb RED=0 GREEN=0.0 BLUE=0.0 WHITE=0.5
  #SET_PIN PIN=caselight VALUE=0.8

[gcode_macro LIGHT_OFF]
gcode:
  SET_LED LED=hotend_rgb RED=0.02 GREEN=0 BLUE=0 WHITE=0 INDEX=1 TRANSMIT=0
  SET_LED LED=hotend_rgb RED=0 GREEN=0 BLUE=0 WHITE=0 INDEX=2 TRANSMIT=0
  SET_LED LED=hotend_rgb RED=0 GREEN=0 BLUE=0 WHITE=0 INDEX=3 TRANSMIT=1
  #SET_PIN PIN=caselight VALUE=0